<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Link - Alan Nuari</title>

    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mencegah highlight biru saat elemen diklik di HP */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .link-card:active {
            transform: scale(0.98);
        }
        /* Efek background pattern halus */
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-pattern text-slate-800 font-sans min-h-screen antialiased flex flex-col items-center">

    <main class="w-full max-w-md mx-auto px-6 py-12 flex flex-col items-center min-h-screen relative">
        
        <button onclick="shareLink()" class="absolute top-6 right-6 p-2 bg-white rounded-full shadow-sm border border-slate-200 text-slate-400 hover:text-blue-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
        </button>

        <div class="flex flex-col items-center mt-4 mb-8">
            <div class="relative">
                <img src="https://ui-avatars.com/api/?name=Alan+Nuari&background=2563eb&color=fff&size=150" alt="Profile" class="w-24 h-24 rounded-full shadow-lg border-4 border-white object-cover">
                <div class="absolute bottom-0 right-0 bg-green-500 w-5 h-5 rounded-full border-2 border-white" title="Online"></div>
            </div>
            
            <h1 class="mt-4 text-xl font-bold text-slate-900 tracking-tight">Alan Nuari</h1>
            <p class="text-sm text-slate-500 font-medium mt-1">Penata Kelola Sistem & Teknologi Informasi</p>
            
            <div class="flex gap-2 mt-3">
                <span class="px-3 py-1 bg-slate-200 text-slate-700 text-[10px] uppercase font-bold rounded-full tracking-wide">DISHUB</span>
            </div>
        </div>

        <div class="w-full space-y-4 flex-1">
            
            <a href="#" class="link-card flex items-center p-4 bg-blue-600 text-white rounded-2xl shadow-md hover:bg-blue-700 transition-all duration-200 group">
                <div class="bg-white/20 p-2 rounded-xl group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <div class="ml-4 flex-1">
                    <span class="block font-semibold text-sm">Direktori Data ASN</span>
                    <span class="block text-xs text-blue-100 mt-0.5">Sistem pencarian dan salin data NIP</span>
                </div>
                <svg class="w-5 h-5 opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </a>

            <a href="https://script.google.com/macros/s/AKfycbxSGdCSSSnBJOJkr47Dshei1CbL-nX0WTt_Y7LtDeV7Dk5ozgxnQhYz7n3vuvp8nOmwEw/exec" class="link-card flex items-center p-4 bg-white border border-slate-200 text-slate-700 rounded-2xl shadow-sm hover:border-blue-300 hover:bg-blue-50 transition-all duration-200 group">
                <div class="bg-slate-100 text-slate-500 p-2 rounded-xl group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                </div>
                <div class="ml-4 flex-1">
                    <span class="block font-semibold text-sm">PDF LLAJ</span>
                    <span class="block text-xs text-black-100 mt-0.5">Sistem pembuatan laporan PDF LLAJ</span>
                </div>
                <svg class="w-4 h-4 text-slate-300 group-hover:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>


        </div>

        <div class="mt-12 text-center pb-6">
            <p class="text-xs text-slate-400 font-medium">© 2026 Alan Nuari - LLAJ Dishub Ogan Ilir</p>
        </div>
    </main>

    <div id="share-toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-900/95 text-white text-xs font-medium px-4 py-2 rounded-lg shadow-xl opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        Tautan berhasil disalin!
    </div>

    <script>
        // Fungsi untuk tombol bagikan (Share)
        function shareLink() {
            const currentUrl = window.location.href;
            
            // Cek apakah browser mendukung fitur Web Share API (Biasanya di HP modern)
            if (navigator.share) {
                navigator.share({
                    title: 'Dashboard IT',
                    text: 'Lihat direktori sistem IT dan ASN:',
                    url: currentUrl,
                }).catch(console.error);
            } else {
                // Fallback: Salin link ke clipboard jika dibuka di PC/Browser lama
                navigator.clipboard.writeText(currentUrl).then(() => {
                    const toast = document.getElementById('share-toast');
                    toast.classList.remove('opacity-0');
                    setTimeout(() => {
                        toast.classList.add('opacity-0');
                    }, 2000);
                });
            }
        }
    </script>
</body>
</html>
