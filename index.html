<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DASHBOARD DISHUB BY ALAN NUARI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#f8fafc,#eef4ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fadeIn .8s ease;
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:white;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
    display:flex;
    justify-content:center;
    align-items:center;
    animation:float 2s ease-in-out infinite;
}

.logo img{
    width:60px;
}

h2{
    margin-top:25px;
    color:#1f2937;
    font-weight:600;
    letter-spacing:.5px;
}

p{
    margin-top:8px;
    color:#6b7280;
    font-size:15px;
}

.loader{
    width:240px;
    height:6px;
    background:#dbeafe;
    border-radius:50px;
    overflow:hidden;
    margin:35px auto 15px;
}

.loader span{
    display:block;
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#2563eb,#60a5fa);
    animation:loading 3s linear forwards;
}

.spinner{
    width:28px;
    height:28px;
    border:3px solid #dbeafe;
    border-top:3px solid #2563eb;
    border-radius:50%;
    margin:auto;
    animation:spin .8s linear infinite;
}

@keyframes loading{
    from{width:0%;}
    to{width:100%;}
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <!-- Ganti logo.png dengan logo Anda -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Logo_Kementerian_Perhubungan_Indonesia_%28Kemenhub%29.png" alt="Logo">
    </div>

    <h2>Selamat Datang di Dashboard By Alan</h2>
    <p>Mohon tunggu sebentar...</p>

    <div class="loader">
        <span></span>
    </div>

    <div class="spinner"></div>

</div>

<script>
setTimeout(function(){
    window.location.href="https://script.google.com/macros/s/AKfycbzrbvsjFilyx2-RPKWZ7mQA_9D_rJS972tG8J1Ow7kbT4u55w3vvXziixZQvklS6AtT/exec";
},500);
</script>

</body>
</html>
